<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测评</title>
  <!-- Vue 双CDN 稳定兜底 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script>
  <script>
  if (typeof Vue === 'undefined') {
    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.14/vue.min.js"><\/script>')
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 1. 开始页 -->
    <div class="page" v-show="stage === 'start'">
      <div class="card">
        <h1>测测你的人格更像舞萌的哪种Note</h1>
        <div class="header-image">
          <img src="images/head.png" alt="Header Image">
        </div>
        <input type="text" v-model="userName" placeholder="请输入你的昵称" class="input-name">
        <button class="btn-primary" @click="start">开始测试</button>
      </div>
    </div>

    <!-- 2. 答题页 -->
    <div class="page" v-show="stage === 'quiz'">
      <div class="card">
        <div class="progress-bar">
          <div class="progress" :style="{ width: progress + '%' }"></div>
        </div>
        <div class="question">
          第 {{ currentIdx + 1 }} / {{ questions.length }} 题：{{ currentQuestion.title }}
        </div>
        <div class="options">
          <button 
            class="btn-option" 
            v-for="(opt,i) in currentQuestion.options" 
            :key="i"
            @click="choose(opt)"
          >
            {{ opt.text }}
          </button>
        </div>
        <div class="button-container">
          <button class="btn-question" v-if="currentIdx > 0" @click="prevQuestion">上一题</button>
          <button class="btn-question" v-if="currentIdx < questions.length - 1" @click="nextQuestion">下一题</button>
          <button class="btn-question" v-if="currentIdx === questions.length - 1" @click="calcResult">提交</button>
        </div>
      </div>
    </div>

    <!-- 3. 结果页 -->
    <div class="page" v-show="stage === 'result'">
      <div class="card">
        <h1>测评结果</h1>
        <div class="result-box" v-if="this.result">
          <p class="user-name">欢迎回来~， {{ userName ? userName : 'wmc' }}！你最接近</p>
          
          <!-- 初步结果 -->
          <div class="result-basic">
            <img :src="result.img" class="avatar">
            <h2 class="result-name">{{ this.result.name }}</h2>
            <p>{{ this.result.desc }}</p>
          </div>
          
          <!-- 结果符合度 -->
          <div class="result-section">
            <div class="section-title">结果符合度</div>
            <div class="result-match">
              <div class="progress-ring-container">
                <svg class="progress-ring" width="120" height="120">
                  <circle class="progress-ring-background" cx="60" cy="60" r="50" />
                  <circle class="progress-ring-progress" cx="60" cy="60" r="50" :stroke-dasharray="circumference" :stroke-dashoffset="dashOffset" />
                </svg>
                <div class="progress-ring-text">{{ matchPercentage }}%</div>
              </div>
              <p class="match-text">你与该类型的匹配程度</p>
            </div>
          </div>
          
          <!-- 详细解释 -->
          <div class="result-section">
            <div class="section-title">详细解释</div>
            <div class="result-detail">
              <p>{{ this.result.explain }}</p>
            </div>
          </div>
        </div>
        <button class="btn-primary" @click="restart">重新测试</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
