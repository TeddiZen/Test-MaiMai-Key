<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音游看板娘测评</title>
  <!-- Vue 双CDN 稳定兜底 -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script>
  <script>
  if (typeof Vue === 'undefined') {
    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.14/vue.min.js"><\/script>')
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 1. 开始页 -->
    <div class="page" v-show="stage === 'start'">
      <div class="card">
        <h1>音游看板娘测评</h1>
        <button class="btn-primary" @click="start">开始测试</button>
      </div>
    </div>

    <!-- 2. 答题页 -->
    <div class="page" v-show="stage === 'quiz'">
      <div class="card">
        <div class="progress-bar">
          <div class="progress" :style="{ width: progress + '%' }"></div>
        </div>
        <div class="question">
          第 {{ currentIdx + 1 }} 题：{{ currentQuestion.title }}
        </div>
        <div class="options">
          <button 
            class="btn-option" 
            v-for="(opt,i) in currentQuestion.options" 
            :key="i"
            @click="choose(opt)"
          >
            {{ opt.text }}
          </button>
        </div>
      </div>
    </div>

    <!-- 3. 结果页 -->
    <div class="page" v-show="stage === 'result'">
      <div class="card">
        <h2>测评结果</h2>
        <div class="result-box" v-if="result">
          <img :src="result.img" class="avatar">
          <h3>{{ result.name }}</h3>
          <p>{{ result.desc }}</p>
        </div>
        <button class="btn-primary" @click="restart">重新测试</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
